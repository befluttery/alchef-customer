name: alchef
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  go_router: ^17.2.0
  pinput: ^6.0.2
  dio: ^5.9.2
  hive: ^2.2.3
  path_provider: ^2.1.3
  json_annotation: ^4.9.0
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  fluttertoast: ^8.2.4
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  get: ^4.6.6
  carousel_slider: ^5.1.1
  webview_flutter: ^4.11.0
  location: ^8.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0
  google_places_flutter: ^2.1.1
  permission_handler: ^11.3.1
  flutter_easyloading: ^3.0.5
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  json_serializable: ^6.9.0
  build_runner: ^2.4.15
  freezed: ^3.2.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/static/Inter_18pt-Thin.ttf
          weight: 100
        - asset: assets/fonts/static/Inter_18pt-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/static/Inter_18pt-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/static/Inter_18pt-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/static/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/static/Inter_18pt-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/static/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/static/Inter_18pt-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/static/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/Inter_18pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/static/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/static/Inter_18pt-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/static/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/static/Inter_18pt-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/static/Inter_18pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/static/Inter_18pt-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/static/Inter_18pt-Black.ttf
          weight: 900
        - asset: assets/fonts/static/Inter_18pt-BlackItalic.ttf
          weight: 900
          style: italic
